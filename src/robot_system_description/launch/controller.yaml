robot_system_controller:
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  joint_x_position_controller:
    type: effort_controllers/JointPositionController
    joint: joint_x
    pid: {p: 1000.0, i: 0.0, d: 50.0}

  joint_y_position_controller:
    type: effort_controllers/JointPositionController
    joint: joint_y
    pid: {p: 300.0, i: 0.0, d: 15.0}

  joint_z_position_controller:
    type: effort_controllers/JointPositionController
    joint: joint_z
    pid: {p: 500.0, i: 1.0, d: 5.0}

  joint_theta_position_controller:
    type: effort_controllers/JointPositionController
    joint: joint_theta
    pid: {p: 1.0, i: 0.0, d: 0.1}